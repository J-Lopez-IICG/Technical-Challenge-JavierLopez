services:
  # Message Broker Coordination
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: fintech_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

# Real-time Event Streaming
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: fintech_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # Data Lake Storage
  minio:
    image: minio/minio
    container_name: minio_datalake
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # Data Orchestration
  airflow:
    image: apache/airflow:2.8.1
    container_name: airflow_orchestrator
    depends_on:
      - minio
      - kafka
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./main.py:/opt/airflow/main.py
      - ./transactions:/opt/airflow/transactions
      - ./processed:/opt/airflow/processed
      - ./suspicious:/opt/airflow/suspicious
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - MINIO_URL=http://minio:9000
      - _PIP_ADDITIONAL_REQUIREMENTS=faker boto3 requests pandas kafka-python
    command: >
      bash -c "airflow db init &&
      airflow users create --username admin --firstname Javier --lastname Lopez --role Admin --email admin@example.com --password admin || true &&
      airflow standalone"

  # Data Warehouse
  postgres:
    image: postgres:15
    container_name: fintech_postgres
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=fintech_dw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d fintech_dw"]
      interval: 10s
      retries: 5
      start_period: 5s

volumes:
  minio_data:
  postgres_data: