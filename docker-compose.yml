services:
  minio:
    image: minio/minio
    container_name: minio_datalake
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  airflow:
    image: apache/airflow:2.8.1
    container_name: airflow_orchestrator
    depends_on:
      - minio
    ports:
      - "8080:8080" # Interfaz Web de Airflow
    volumes:
      # Mapeamos tu código local dentro del contenedor de Airflow
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./main.py:/opt/airflow/main.py
      - ./transactions:/opt/airflow/transactions
      - ./processed:/opt/airflow/processed
      - ./suspicious:/opt/airflow/suspicious
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - MINIO_URL=http://minio:9000
      - _PIP_ADDITIONAL_REQUIREMENTS=faker boto3 requests pandas
    # Usamos un comando compuesto para asegurar que el usuario siempre exista
    command: >
      bash -c "airflow db init &&
      airflow users create --username admin --firstname Javier --lastname Lopez --role Admin --email admin@example.com --password admin || true &&
      airflow standalone"
  postgres:
    image: postgres:15
    container_name: fintech_postgres
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=fintech_dw
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d fintech_dw"]
      interval: 10s
      retries: 5
      start_period: 5s

volumes:
  minio_data:
  postgres_data: